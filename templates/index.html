{% load static %}
<!DOCTYPE html>
<html lang="zh-hans">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="{% static 'dist/favicon.svg' %}" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Website</title>
    {% if debug %}
    <script type="module" src="http://localhost:5173/@vite/client"></script>
    <script type="module" src="http://localhost:5173/src/main.js"></script>
    {% else %}
    {% for css in vite_css %}
    <link rel="stylesheet" href="{% static 'dist/' %}{{ css }}" />
    {% endfor %}
    {% endif %}
</head>
<body>
    <div id="app"></div>
    {% if not debug %}
    {% for js in vite_js %}
    <script type="module" src="{% static 'dist/' %}{{ js }}"></script>
    {% endfor %}
    {% endif %}
</body>
</html>
